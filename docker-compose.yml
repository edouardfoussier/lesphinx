services:
  lesphinx:
    build: .
    container_name: lesphinx
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - leaderboard-data:/app/lesphinx/data
    networks:
      - web

  mcp-server:
    build: .
    container_name: lesphinx-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LESPHINX_API_URL=http://lesphinx:8000
    command: ["python", "-m", "lesphinx.mcp_server", "--sse"]
    depends_on:
      - lesphinx
    networks:
      - web

volumes:
  leaderboard-data:

networks:
  web:
    external: true
