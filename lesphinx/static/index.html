<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeSphinx</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <!-- Welcome Screen -->
        <div id="screen-welcome" class="screen active">
            <div class="sphinx-avatar" id="avatar-welcome">
                <div class="sphinx-eye left"></div>
                <div class="sphinx-eye right"></div>
            </div>
            <h1>LeSphinx</h1>
            <p class="subtitle" id="welcome-subtitle">Pense a un personnage celebre... Je vais le deviner.</p>

            <div class="language-select">
                <button class="lang-btn active" data-lang="fr">Francais</button>
                <button class="lang-btn" data-lang="en">English</button>
            </div>

            <button id="btn-start" class="btn-primary">Nouvelle Partie</button>

            <label class="silent-mode">
                <input type="checkbox" id="toggle-silent">
                <span id="silent-label">Mode silencieux (pas de micro)</span>
            </label>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="screen">
            <div class="game-header">
                <span id="turn-counter">Tour 0</span>
                <span id="question-counter">Questions: 0/15</span>
            </div>

            <div class="sphinx-avatar" id="avatar-game">
                <div class="sphinx-eye left"></div>
                <div class="sphinx-eye right"></div>
            </div>

            <div id="sphinx-bubble" class="speech-bubble">
                <p id="sphinx-text">...</p>
            </div>

            <div id="thinking-indicator" class="thinking hidden">
                <span></span><span></span><span></span>
            </div>

            <div id="controls" class="controls hidden">
                <button id="btn-record" class="btn-record" title="Maintenir pour parler">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                        <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>

                <div class="text-buttons">
                    <button class="btn-answer" data-answer="yes" id="btn-yes">Oui</button>
                    <button class="btn-answer" data-answer="no" id="btn-no">Non</button>
                    <button class="btn-answer" data-answer="unknown" id="btn-unknown">Je ne sais pas</button>
                </div>
            </div>

            <!-- Guess confirmation buttons (hidden by default) -->
            <div id="guess-controls" class="controls hidden">
                <p id="guess-prompt">Est-ce correct ?</p>
                <div class="text-buttons">
                    <button class="btn-answer btn-guess-yes" id="btn-guess-yes">Oui, c'est ca !</button>
                    <button class="btn-answer btn-guess-no" id="btn-guess-no">Non, continue</button>
                </div>
            </div>
        </div>

        <!-- End Screen -->
        <div id="screen-end" class="screen">
            <div class="sphinx-avatar" id="avatar-end">
                <div class="sphinx-eye left"></div>
                <div class="sphinx-eye right"></div>
            </div>
            <h2 id="end-title">Partie terminee</h2>
            <p id="end-message"></p>
            <button id="btn-restart" class="btn-primary">Rejouer</button>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
